spring.application.name=backend
server.port=${SERVER_PORT:8082}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:think_india_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=false

spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=clientid.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=clientsecret
spring.security.oauth2.client.registration.google.scope=email


# IMPORTANT: This should be your BACKEND port, not frontend
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8082/login/oauth2/code/google}

# OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

#Brevo mail sender service
spring.mail.host=host.brevo.com
spring.mail.port=5888
spring.mail.username=username@smtp-brevo.com
spring.mail.password=password
SUPPORT_EMAIL_ID = ${SENDER_EMAIL:no-reply@thinkindiasvnit.in}

# AWS S3
aws_region=ap-south-1
aws_s3_bucket=bucketname


# Set max size for a single file to 25MB
spring.servlet.multipart.max-file-size=25MB
# Set max size for the entire request to 100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Add debug logging
logging.level.org.springframework.web=DEBUG
logging.level.com.thinkIndia=DEBUG